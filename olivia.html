<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

.profiles {
  display: flex;
  justify-content: space-around;
  gap: 20px;
  flex-wrap: wrap;
}

.profile {
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 3px solid transparent;
  width: 200px;
  cursor: pointer;
}

.profile.selected {
  border-color: #ff4d6d;
}

.profile.disabled {
  opacity: 0.4;
  pointer-events: none;
}

.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
}

.videos {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

video {
  width: 420px;
  display: none;
}
</style>
</head>

<body>
<div class="container">

<h2>People who accessed your profile</h2>
<p><strong>You can select up to 2 people.</strong> Once selected, your choice is final.</p>

<div class="profiles">

  <div class="profile" data-video="jackVideo">
    Jack.png
    <p>Jack</p>
  </div>

  <div class="profile" data-video="francoVideo">
    Franco.png
    <p>Franco</p>
  </div>

  <div class="profile" data-video="broderickVideo">
    Broderick.png
    <p>Broderick</p>
  </div>

</div>

<div class="videos">
  Olivia - Jack Cutdown.mp4</video>
  Olivia - Franco Cutdown.mp4</video>
  Olivia - Broderick Cutdown.mp4</video>
</div>

</div>

<script>
let selectedCount = 0;
const maxSelections = 2;
const profiles = document.querySelectorAll('.profile');

profiles.forEach(profile => {
  profile.addEventListener('click', () => {
    if (selectedCount >= maxSelections) return;

    profile.classList.add('selected');
    selectedCount++;

    const videoId = profile.dataset.video;
    document.getElementById(videoId).style.display = 'block';

    if (selectedCount === maxSelections) {
      profiles.forEach(p => {
        if (!p.classList.contains('selected')) {
          p.classList.add('disabled');
        }
      });
    }
  });
});
</script>

</body>
</html>
