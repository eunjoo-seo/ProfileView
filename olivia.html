<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

.notice {
  font-size: 14px;
  margin-bottom: 20px;
}

.profile {
  background: white;
  padding: 18px;
  border-radius: 12px;
  width: 220px;
  margin: 0 auto 20px auto;
}

.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
}

.profile-name {
  margin-top: 10px;
  font-weight: 600;
  font-size: 16px;
}

video {
  width: 420px;
  margin-top: 20px;
}

button {
  display: none;
  margin-top: 20px;
  padding: 10px 18px;
  font-size: 14px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

  <h2>People who accessed your profile</h2>
  <p class="notice">
    You can watch each interaction video. Please watch at least 15 seconds before continuing.
  </p>

  <div id="profileContainer"></div>

  <video id="videoPlayer" controls></video>

  <button id="nextButton">Next Profile</button>

</div>

<script>
// ---------- DATA ----------
const profiles = [
  { name: "Jack", img: "Jack.png", video: "Olivia - Jack Cutdown.mp4" },
  { name: "Franco", img: "Franco.png", video: "Olivia - Franco Cutdown.mp4" },
  { name: "Broderick", img: "Broderick.png", video: "Olivia - Broderick Cutdown.mp4" }
];

// ---------- RANDOMIZE ----------
profiles.sort(() => Math.random() - 0.5);

// ---------- STATE ----------
let currentIndex = 0;
let unlocked = false;

// ---------- ELEMENTS ----------
const profileContainer = document.getElementById("profileContainer");
const videoPlayer = document.getElementById("videoPlayer");
const nextButton = document.getElementById("nextButton");

// ---------- LOAD PROFILE ----------
function loadProfile(index) {
  unlocked = false;
  nextButton.style.display = "none";
  videoPlayer.currentTime = 0;

  const p = profiles[index];

  profileContainer.innerHTML = `
    <div class="profile">
      <img src="${p.img}" alt="${profile-name">${p.name}</div>
    </div>
  `;

  videoPlayer.src = p.video;
}

// ---------- WATCH TIMER ----------
videoPlayer.addEventListener("timeupdate", () => {
  if (!unlocked && videoPlayer.currentTime >= 15) {
    unlocked = true;
    nextButton.style.display = "inline-block";
  }
});

// ---------- NEXT ----------
nextButton.addEventListener("click", () => {
  currentIndex++;
  if (currentIndex < profiles.length) {
    loadProfile(currentIndex);
  } else {
    profileContainer.innerHTML =
      "<p><strong>You have completed all profile views.</strong></p>";
    videoPlayer.style.display = "none";
    nextButton.style.display = "none";
  }
