<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

.profiles {
  display: flex;
  justify-content: space-around;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.profile {
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 3px solid transparent;
  width: 200px;
  cursor: pointer;
}

.profile.selected {
  border-color: #ff4d6d;
}

.profile.disabled {
  opacity: 0.4;
  pointer-events: none;
}

.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
}

.videos {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

video {
  width: 420px;
  display: none;
}
</style>
</head>

<body>
<div class="container">

<h2>People who accessed your profile</h2>
<p><strong>You can select up to 2 people.</strong> Once selected, your choice is final.</p>

<div class="profiles">

  <div class="profile" data-video="jackVideo">
    <img src="Jack.png" alt="Jack">
    <p>Jack</p>
  </div>

  <div class="profile" data-video="francoVideo">
    <img src="Franco.png" alt="Franco">
    <p>Franco</p>
  </div>

  <div class="profile" data-video="broderickVideo">
    <img src="Broderick.png" alt="Broderick">
    <p>Broderick</p>
  </div>

</div>

<div class="videos">
  <video id="jackVideo" controls>
    <source src="Olivia - Jack Cutdown.mp4" type="video/mp4">
  </video>

  <video id="francoVideo" controls>
    <source src="Olivia - Franco Cutdown.mp4" type="video/mp4">
  </video>

  <video id="broderickVideo" controls>
    <source src="Olivia - Broderick Cutdown.mp4" type="video/mp4">
  </video>
</div>

</div>

<script>
let selectedCount = 0;
const maxSelections = 2;

document.querySelectorAll(".profile").forEach(profile => {
  profile.addEventListener("click", () => {
    if (profile.classList.contains("selected")) return;
    if (selectedCount >= maxSelections) return;

    profile.classList.add("selected");
    selectedCount++;

    document.getElementById(profile.dataset.video).style.display = "block";

    if (selectedCount === maxSelections) {
      document.querySelectorAll(".profile:not(.selected)").forEach(p => {
        p.classList.add("disabled");
      });
    }
  });
});
</script>

</body>
</html>
