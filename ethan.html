<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

h2 {
  margin-bottom: 6px;
}

.notice {
  font-size: 14px;
  margin-bottom: 25px;
}

.profiles {
  display: flex;
  justify-content: space-around;
  gap: 20px;
  flex-wrap: wrap;
}

.profile {
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 3px solid transparent;
  width: 200px;
  cursor: pointer;
  transition: 0.2s;
}

.profile.selected {
  border-color: #4d96ff;
}

.profile.disabled {
  opacity: 0.4;
  pointer-events: none;
}

.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
}

.videos {
  margin-top: 35px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

video {
  width: 420px;
  display: none;
}
</style>
</head>

<body>
<div class="container">

  <h2>People who accessed your profile</h2>
  <p class="notice">
    <strong>You can select up to 2 people.</strong><br>
    Once selected, your choice is final.
  </p>

  <div class="profiles">

    <div class="profile" data-video="samVideo">
      <img src="Sam.png" alt="Sam">
      <p>Sam</p>
    </div>

    <div class="profile" data-video="ejVideo">
      <img src="EJ.png" alt="EJ">
      <p>EJ</p>
    </div>

    <div class="profile" data-video="bethanyVideo">
      <img src="Bethany.png" alt="Bethany">
      <p>Bethany</p>
    </div>

  </div>

  <div class="videos">
    <video id="samVideo" controls>
      <source src="Ethan - Sam Cutdown.mp4" type="video/mp4">
    </video>

    <video id="ejVideo" controls>
      <source src="Ethan - EJ Cutdown.mp4" type="video/mp4">
    </video>

    <video id="bethanyVideo" controls>
      <source src="Ethan - Bethany Cutdown.mp4" type="video/mp4">
    </video>
  </div>

</div>

<script>
let selectedCount = 0;
const maxSelections = 2;

document.querySelectorAll(".profile").forEach(profile => {
  profile.addEventListener("click", () => {
    if (profile.classList.contains("selected")) return;
    if (selectedCount >= maxSelections) return;

    profile.classList.add("selected");
    selectedCount++;

    const videoId = profile.dataset.video;
    document.getElementById(videoId).style.display = "block";

    if (selectedCount === maxSelections) {
      document.querySelectorAll(".profile:not(.selected)").forEach(p => {
        p.classList.add("disabled");
      });
    }
  });
});
</script>

</body>
</html>
