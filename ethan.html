<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

.notice {
  font-size: 14px;
  margin-bottom: 25px;
}

.profile {
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 3px solid transparent;
  width: 220px;
  margin: 0 auto 20px auto;
}

.profile img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
}

video {
  width: 420px;
  margin-top: 20px;
  display: none;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>
<div class="container">

<h2>People who accessed your profile</h2>
<p class="notice">
  You can watch each interaction video. Please watch at least 15 seconds before continuing.
</p>

<div id="profileContainer"></div>

<video id="videoPlayer" controls></video>

<button id="nextButton">Next Profile</button>

</div>

<script>
// ---------- DATA ----------
const profiles = [
  { name: "Sam", img: "Sam.png", video: "Ethan - Sam Cutdown.mp4" },
  { name: "EJ", img: "EJ.png", video: "Ethan - EJ Cutdown.mp4" },
  { name: "Bethany", img: "Bethany.png", video: "Ethan - Bethany Cutdown.mp4" }
];

// ---------- RANDOMIZE ORDER ----------
profiles.sort(() => Math.random() - 0.5);

// ---------- STATE ----------
let currentIndex = 0;
let watchedEnough = false;

// ---------- ELEMENTS ----------
const profileContainer = document.getElementById("profileContainer");
const videoPlayer = document.getElementById("videoPlayer");
const nextButton = document.getElementById("nextButton");

// ---------- RENDER PROFILE ----------
function loadProfile(index) {
  watchedEnough = false;
  nextButton.style.display = "none";
  videoPlayer.style.display = "none";
  videoPlayer.currentTime = 0;

  const p = profiles[index];

  profileContainer.innerHTML = `
    <div class="profile">
      <img src="${p.img}" alt="${</p>
    </div>
  `;

  videoPlayer.src = p.video;
  videoPlayer.style.display = "block";
  videoPlayer.play();
}

loadProfile(currentIndex);

// ---------- WATCH-TIME GATE (15s) ----------
videoPlayer.addEventListener("timeupdate", () => {
  if (!watchedEnough && videoPlayer.currentTime >= 15) {
    watchedEnough = true;
    nextButton.style.display = "inline-block";
  }
});

// ---------- NEXT BUTTON ----------
nextButton.addEventListener("click", () => {
  currentIndex++;
  if (currentIndex < profiles.length) {
    loadProfile(currentIndex);
  } else {
    profileContainer.innerHTML = "<p><strong>You have completed all profile views.</strong></p>";
    videoPlayer.style.display = "none";
    nextButton.style.display = "none";
  }
});
</script>

</body>
</html>
``
